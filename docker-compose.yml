version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: k8n_db_sahil:1.0.0
    container_name: k8n-db-api
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: k8n
      DB_USER: admin
      DB_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy
  db:
    build:
      context: ./DB
      dockerfile: Dockerfile
    image: k8n_postgres_sahil:1.0.0
    container_name: k8n-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: k8n
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: